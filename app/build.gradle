plugins {
    id 'com.android.application'
}

android {
    namespace "com.khanhnguyen9872.irremote"
    compileSdk 33

    defaultConfig {
        applicationId "com.khanhnguyen9872.irremote"
        minSdk 26
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
    compileOnly 'de.robv.android.xposed:api:82:sources'
}
